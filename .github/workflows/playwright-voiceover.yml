name: Playwright VoiceOver

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  playwright-voiceover:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26]
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Guidepup Setup
        uses: guidepup/setup-action@0.21.0
        with:
          record: true
      - run: npm ci --no-audit --no-fund --no-progress
      - run: npm run build
      - run: npm ci --prefix ./examples/playwright-voiceover --no-audit --no-fund --no-progress
      - run: npm --prefix ./examples/playwright-voiceover rebuild ffmpeg-static --ignore-scripts=false
      - run: npm --prefix ./examples/playwright-voiceover run browsers
      - run: npm --prefix ./examples/playwright-voiceover run test:${{ matrix.browser }}
      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: artifacts-${{ matrix.os }}-${{ matrix.browser }}
          path: |
            **/test-results/**/*
            **/recordings/**/*
