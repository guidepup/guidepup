name: Playwright NVDA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  playwright-nvda:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025]
        browser: [chromium, firefox]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Guidepup Setup
        uses: guidepup/setup-action@0.20.0
        with:
          record: true
      - run: yarn install --frozen-lockfile
      - run: yarn --cwd ./examples/playwright-nvda install --frozen-lockfile
      - run: yarn --cwd ./examples/playwright-nvda pretest
      - run: yarn --cwd ./examples/playwright-nvda test:${{ matrix.browser }}
      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: artifacts-${{ matrix.os }}-${{ matrix.browser }}
          path: |
            **/test-results/**/*
            **/recordings/**/*
